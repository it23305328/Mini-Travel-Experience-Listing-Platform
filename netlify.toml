[build]
  command = "npm install --prefix backend && npm install --prefix frontend && npx --prefix frontend vite build"
  publish = "frontend/dist"
[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
